services:
  ingest:
    build: 
      context: ./data_ingestion
      dockerfile: Dockerfile.ingest
    command: python app.py
    network_mode: "host"
    environment:
      - SERVING_URL=http://${HOST_IP}:5002/predict
      - DRIFT_URL=http://${HOST_IP}:5003/drift
    volumes:
      - "/var/lib/jenkins/workspace/Drift Detection/data/churn-model:/data/churn-model"

  training:
    build:
      context: ./model_training
      dockerfile: Dockerfile.training
    command: python train.py
    network_mode: "host"
    volumes:
      - "/var/lib/jenkins/workspace/Drift Detection/data/churn-model:/data/churn-model"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  serving:
    build:
      context: ./model_serving
      dockerfile: Dockerfile.serving
    command: python serve.py
    network_mode: "host"
    depends_on:
      training:
        condition: service_healthy
    volumes:
      - "/var/lib/jenkins/workspace/Drift Detection/data/churn-model:/data/churn-model"

  drift:
    build:
      context: ./drift_detection
      dockerfile: Dockerfile.drift
    command: python drift_detection.py
    network_mode: "host"
    depends_on:
      training:
        condition: service_healthy
    environment:
      - TRAINING_URL=http://${HOST_IP}:5001/train
    volumes:
      - "/var/lib/jenkins/workspace/Drift Detection/data/churn-model:/data/churn-model"

volumes:
  shared-pvc: