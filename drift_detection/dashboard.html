<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIA | XAI Diagnostic Command Center</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deep: '#020617',
                        card: 'rgba(15, 23, 42, 0.7)',
                        borderMuted: '#1e293b',
                        cyan: '#22d3ee',
                        emerald: '#10b981',
                        amber: '#f59e0b',
                        rose: '#f43f5e',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background: linear-gradient(135deg, #020617 0%, #0a0f1d 100%);
            color: #f8fafc; 
        }
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #22d3ee; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Custom Checkbox */
        .feature-checkbox:checked + label {
            background: rgba(34, 211, 238, 0.1);
            border-color: #22d3ee;
            color: #22d3ee;
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden min-h-screen">
    <div id="overlay" class="fixed inset-0 bg-deep/90 z-50 flex flex-col items-center justify-center gap-4 transition-opacity duration-300">
        <div class="spinner"></div>
        <p class="text-lg font-semibold tracking-wide animate-pulse text-cyan">Analyzing Model Integrity...</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-[300px_1fr] min-h-screen">
        <!-- Sidebar -->
        <aside class="bg-black/50 border-r border-borderMuted p-6 flex flex-col gap-8 backdrop-blur-md">
            <div class="flex items-center gap-3 text-xl font-extrabold tracking-tight">
                <div class="w-8 h-8 bg-gradient-to-br from-cyan to-blue-600 rounded-lg shadow-[0_0_15px_rgba(34,211,238,0.5)]"></div>
                AIA DIAGNOSTIC
            </div>



            <div class="flex-grow">
                <div class="text-xs font-bold uppercase text-slate-400 mb-4 tracking-wider">RCA Feature Selection</div>
                <div class="grid grid-cols-2 gap-2 mb-4" id="featureCheckboxes">
                    <!-- Features Checkboxes -->
                </div>
                <button onclick="runCustomRCA()" class="w-full bg-gradient-to-r from-cyan to-blue-500 hover:from-cyan-400 hover:to-blue-400 text-deep font-bold py-3 px-4 rounded-xl shadow-[0_0_20px_rgba(34,211,238,0.3)] transition-all duration-300 transform hover:-translate-y-1">
                    Run Custom Analysis
                </button>
            </div>

            <!-- Removed Refresh Pipeline Button -->
        </aside>

        <!-- Main Content -->
        <main class="p-8 pb-12 relative overflow-y-auto">
            <!-- Background glow -->
            <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-cyan/10 rounded-full blur-[120px] -z-10 pointer-events-none"></div>

            <!-- Executive Header -->
            <div class="glass-card rounded-2xl p-6 md:p-8 flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
                <div class="flex items-center gap-4">
                    <div id="statusIndicator" class="w-4 h-4 rounded-full bg-emerald shadow-[0_0_15px_rgba(16,185,129,0.8)]"></div>
                    <div>
                        <div id="statusText" class="text-2xl font-bold tracking-tight">Model Healthy</div>
                        <div class="text-sm text-slate-400 mt-1">Last Analysis: Just Now</div>
                    </div>
                </div>
                <div class="flex gap-8 md:gap-12">
                    <div class="text-right">
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Confidence Score</div>
                        <div class="text-3xl font-extrabold font-mono" id="confScore">98%</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Rogue Features</div>
                        <div class="text-3xl font-extrabold font-mono text-amber" id="rogueCount">0</div>
                    </div>
                </div>
            </div>

            <!-- Dashboard Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-[1fr_1.5fr] gap-6 mb-6">
                <!-- Insights Card -->
                <div class="glass-card rounded-2xl p-6 bg-gradient-to-br from-slate-900 to-deep border border-slate-800">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-lg">Diagnostic Insights</h3>
                        <span class="text-cyan text-sm font-semibold bg-cyan/10 px-3 py-1 rounded-full">AI Summary</span>
                    </div>
                    <p id="explanationText" class="text-slate-300 leading-relaxed text-sm">Loading insights...</p>
                </div>

                <!-- Delta Chart Card -->
                <div class="glass-card rounded-2xl p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-lg">Feature Importance Delta (XAI)</h3>
                        <span class="text-slate-400 text-sm font-semibold">Baseline vs Drifted</span>
                    </div>
                    <div id="deltaChart" class="h-[300px] w-full"></div>
                </div>
            </div>

            <!-- Mirror Distribution Card -->
            <div class="glass-card rounded-2xl p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-lg">The 'Mirror' Distribution (Statistical Drift)</h3>
                    <select id="featureSelector" onchange="updateMirrorHistogram()" class="bg-deep text-white border border-borderMuted px-4 py-2 rounded-lg focus:outline-none focus:border-cyan transition-colors">
                        <!-- Options injected -->
                    </select>
                </div>
                <div id="mirrorHistogram" class="h-[400px] w-full"></div>
            </div>
        </main>
    </div>

    <script>
        let dashboardData = null;
        const ALL_FEATURES = ['CreditScore', 'Geography', 'Gender', 'Age', 'Tenure', 'Balance', 'NumOfProducts', 'HasCrCard', 'IsActiveMember', 'EstimatedSalary'];

        async function initDashboard() {
            renderCheckboxes();
            // Start with a couple of defaults checked
            document.getElementById('chk_Age').checked = true;
            document.getElementById('chk_Balance').checked = true;
            await runCustomRCA();
        }

        function renderCheckboxes() {
            const container = document.getElementById('featureCheckboxes');
            container.innerHTML = '';
            ALL_FEATURES.forEach(feature => {
                const wrapper = document.createElement('div');
                wrapper.className = 'relative';
                
                const input = document.createElement('input');
                input.type = 'checkbox';
                input.id = `chk_${feature}`;
                input.value = feature;
                input.className = 'feature-checkbox hidden';

                const label = document.createElement('label');
                label.htmlFor = `chk_${feature}`;
                label.className = 'block w-full text-center text-[10px] font-semibold py-2 px-1 border border-borderMuted rounded cursor-pointer transition-all duration-200 text-slate-400 hover:border-slate-500 truncate';
                label.innerText = feature;

                wrapper.appendChild(input);
                wrapper.appendChild(label);
                container.appendChild(wrapper);
            });
        }

        async function runCustomRCA() {
            const overlay = document.getElementById('overlay');
            overlay.classList.remove('hidden');
            overlay.style.opacity = '1';
            
            try {
                // Gather checked features
                const checkboxes = document.querySelectorAll('.feature-checkbox:checked');
                let features = Array.from(checkboxes).map(cb => cb.value);
                if (features.length === 0) features = ["Age", "Balance"]; // fallback

                const response = await fetch('/run-rca', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ drifted_features: features })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                }
                
                dashboardData = await response.json();
                renderUI();
                
                // Hide overlay smoothly
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 300);
            } catch (err) {
                console.error(err);
                alert("Critical: Failed to fetch diagnostic data. " + err.message);
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        function renderUI() {
            // 1. Executive Status
            const rogueCount = dashboardData.rogue_features.length;
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            const confScore = document.getElementById('confScore');
            const rogueCountEl = document.getElementById('rogueCount');

            if (rogueCount > 0) {
                statusIndicator.className = 'w-4 h-4 rounded-full bg-rose shadow-[0_0_15px_rgba(244,63,94,0.8)]';
                statusText.innerText = 'Critical Drift Detected';
                confScore.innerText = (100 - (rogueCount * 15)) + '%';
            } else {
                statusIndicator.className = 'w-4 h-4 rounded-full bg-emerald shadow-[0_0_15px_rgba(16,185,129,0.8)]';
                statusText.innerText = 'Model Healthy';
                confScore.innerText = '98%';
            }
            rogueCountEl.innerText = rogueCount;
            document.getElementById('explanationText').innerText = dashboardData.plain_english_explanation;

            // 2. Feature Selector
            const selector = document.getElementById('featureSelector');
            selector.innerHTML = '';

            dashboardData.feature_comparison.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.feature;
                opt.innerText = f.feature;
                selector.appendChild(opt);
            });

            // 3. Feature Importance Delta Chart
            renderDeltaChart();
            
            // 4. Initial Mirror Histogram
            if(dashboardData.feature_comparison.length > 0) {
                updateMirrorHistogram();
            }
        }

        function renderDeltaChart() {
            const features = dashboardData.feature_comparison
                .filter(f => f.baseline_mean_abs_shap > 0 || f.drifted_mean_abs_shap > 0)
                .sort((a,b) => b.drifted_mean_abs_shap - a.drifted_mean_abs_shap);

            const trace1 = {
                x: features.map(f => f.feature),
                y: features.map(f => f.baseline_mean_abs_shap),
                name: 'Training Baseline',
                type: 'bar',
                marker: { color: '#475569' }
            };

            const trace2 = {
                x: features.map(f => f.feature),
                y: features.map(f => f.drifted_mean_abs_shap),
                name: 'Production Drifted',
                type: 'bar',
                marker: { color: features.map(f => f.is_rogue ? '#f59e0b' : '#22d3ee') }
            };

            const layout = {
                barmode: 'group',
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#94a3b8', family: 'Inter' },
                margin: { t: 20, b: 40, l: 40, r: 20 },
                legend: { orientation: 'h', x: 0, y: 1.1 }
            };

            Plotly.newPlot('deltaChart', [trace1, trace2], layout, {responsive: true});
        }

        async function updateMirrorHistogram() {
            const feature = document.getElementById('featureSelector').value;
            if(!feature) return;
            const res = await fetch(`/get-distribution/${feature}`);
            const data = await res.json();

            const trace1 = {
                x: data.train,
                name: 'Baseline Distribution',
                type: 'histogram',
                histnorm: 'probability density',
                opacity: 0.6,
                marker: { color: '#64748b' }
            };

            const trace2 = {
                x: data.production,
                name: 'Production Distribution',
                type: 'histogram',
                histnorm: 'probability density',
                opacity: 0.6,
                marker: { color: '#22d3ee' }
            };

            const layout = {
                barmode: 'overlay',
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#94a3b8', family: 'Inter' },
                margin: { t: 20, b: 40, l: 40, r: 20 },
                xaxis: { title: feature },
                yaxis: { title: 'Density' },
                legend: { orientation: 'h', x: 0, y: 1.1 }
            };

            Plotly.newPlot('mirrorHistogram', [trace1, trace2], layout, {responsive: true});
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
