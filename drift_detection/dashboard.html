<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCA | Root Cause Analysis Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-primary: #38bdf8;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-primary);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
            font-weight: 600;
        }

        /* Summary Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.4);
        }

        .card-title {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .rogue-text {
            color: var(--accent-warning);
        }

        /* Chart Area */
        .chart-card {
            grid-column: span 1;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .feature-row {
            margin-bottom: 1.5rem;
        }

        .feature-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .bar-container {
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .bar-baseline {
            height: 100%;
            background: #475569;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bar-drifted {
            height: 100%;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-success));
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .rogue-bar {
            background: linear-gradient(to right, var(--accent-warning), var(--accent-danger)) !important;
        }

        .legend {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* Controls */
        .controls {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
        }

        input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem 1.5rem;
            color: white;
            flex-grow: 1;
            outline: none;
        }

        button {
            background: var(--accent-primary);
            color: var(--bg-dark);
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem 2rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <p style="color: var(--accent-primary); font-weight: 600; margin-bottom: 0.5rem;">AIA - Root Cause Analysis</p>
                <h1>Drift Insight Dashboard</h1>
            </div>
            <div class="badge">V1.2 Active</div>
        </header>

        <section class="controls">
            <input type="text" id="driftedFeatures" placeholder="Enter drifted features (e.g. Age, Balance)" value="Age, Balance">
            <button onclick="runRCA()">
                <span id="btnText">Run Analysis</span>
                <div id="btnLoader" class="loader"></div>
            </button>
        </section>

        <div id="resultsArea" class="hidden">
            <div class="grid">
                <div class="card">
                    <div class="card-title">Status</div>
                    <div class="card-value" id="statusText">Healthy</div>
                </div>
                <div class="card">
                    <div class="card-title">Rogue Features</div>
                    <div class="card-value rogue-text" id="rogueCount">0</div>
                </div>
                <div class="card">
                    <div class="card-title">Samples Analyzed</div>
                    <div class="card-value" id="sampleCount">50</div>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-header">
                    <h2>Feature Influence Comparison (SHAP)</h2>
                    <div class="legend">
                        <div class="legend-item"><div class="dot" style="background: #475569;"></div> Baseline</div>
                        <div class="legend-item"><div class="dot" style="background: var(--accent-primary);"></div> Drifted Batch</div>
                    </div>
                </div>
                <div id="chartContainer">
                    <!-- Bars injected here -->
                </div>
            </div>

            <div class="card" style="margin-bottom: 2rem;">
                <div class="card-title">Plain English Explanation</div>
                <p id="explanationText" style="font-size: 1.1rem; line-height: 1.6; color: var(--text-main);"></p>
            </div>
        </div>
    </div>

    <script>
        async function runRCA() {
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const resultsArea = document.getElementById('resultsArea');
            const featuresInput = document.getElementById('driftedFeatures').value;
            
            const features = featuresInput.split(',').map(f => f.trim());

            btnText.classList.add('hidden');
            btnLoader.style.display = 'block';

            try {
                const response = await fetch('/run-rca', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ drifted_features: features })
                });

                const data = await response.json();
                renderResults(data);
                resultsArea.classList.remove('hidden');
            } catch (error) {
                alert('Analysis failed: ' + error);
            } finally {
                btnText.classList.remove('hidden');
                btnLoader.style.display = 'none';
            }
        }

        function renderResults(data) {
            document.getElementById('rogueCount').innerText = data.rogue_features.length;
            document.getElementById('sampleCount').innerText = data.num_drifted_samples_analyzed;
            document.getElementById('explanationText').innerText = data.plain_english_explanation;
            
            const chartContainer = document.getElementById('chartContainer');
            chartContainer.innerHTML = '';

            // Find max value for scaling
            const allValues = data.feature_comparison.flatMap(f => [f.baseline_mean_abs_shap, f.drifted_mean_abs_shap]);
            const maxVal = Math.max(...allValues) || 1;

            data.feature_comparison
                .filter(f => f.baseline_mean_abs_shap > 0 || f.drifted_mean_abs_shap > 0)
                .sort((a, b) => b.drifted_mean_abs_shap - a.drifted_mean_abs_shap)
                .forEach(f => {
                    const baselineWidth = (f.baseline_mean_abs_shap / maxVal) * 100;
                    const driftedWidth = (f.drifted_mean_abs_shap / maxVal) * 100;
                    const isRogue = f.is_rogue;

                    const row = document.createElement('div');
                    row.className = 'feature-row';
                    row.innerHTML = `
                        <div class="feature-label">
                            <span>${f.feature} ${isRogue ? '⚠️' : ''}</span>
                            <span style="color: ${isRogue ? 'var(--accent-warning)' : 'var(--text-muted)'}">
                                Ratio: ${f.shift_ratio ? f.shift_ratio.toFixed(2) + 'x' : 'N/A'}
                            </span>
                        </div>
                        <div class="bar-container">
                            <div class="bar-baseline" style="width: ${baselineWidth}%"></div>
                            <div class="bar-drifted ${isRogue ? 'rogue-bar' : ''}" style="width: ${driftedWidth}%"></div>
                        </div>
                    `;
                    chartContainer.appendChild(row);
                });
        }
    </script>
</body>
</html>
