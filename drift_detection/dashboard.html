<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIA | XAI Diagnostic Command Center</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --bg-card: #0f172a;
            --border-muted: #1e293b;
            --accent-cyan: #22d3ee;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-deep); 
            color: var(--text-primary); 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Dashboard Layout */
        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        /* Sidebar */
        aside {
            background: #000;
            border-right: 1px solid var(--border-muted);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-box {
            width: 32px;
            height: 32px;
            background: var(--accent-cyan);
            border-radius: 6px;
        }

        .nav-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .heatmap-cell {
            aspect-ratio: 1;
            background: var(--border-muted);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: 600;
            text-align: center;
            padding: 4px;
        }

        .heatmap-cell:hover { transform: scale(1.05); outline: 2px solid var(--accent-cyan); }

        /* Main Content */
        main { padding: 2rem 3rem; background: radial-gradient(circle at top right, rgba(34, 211, 238, 0.05), transparent); }

        /* Executive Header */
        .exec-header {
            background: var(--bg-card);
            border: 1px solid var(--border-muted);
            border-radius: 1rem;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-emerald);
            box-shadow: 0 0 15px var(--accent-emerald);
        }

        .status-text { font-size: 1.25rem; font-weight: 700; }

        .header-stats { display: flex; gap: 3rem; }
        .stat-item { text-align: right; }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); font-weight: 600; }
        .stat-value { font-size: 1.5rem; font-weight: 800; font-family: 'JetBrains Mono'; }

        /* Cards and Visuals */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .viz-card {
            background: var(--bg-card);
            border: 1px solid var(--border-muted);
            border-radius: 1rem;
            padding: 1.5rem;
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .card-title { font-size: 1rem; font-weight: 700; }

        .insights-card {
            grid-column: span 1;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .insight-text { font-size: 1rem; color: var(--text-primary); line-height: 1.7; font-weight: 400; }

        .action-btn {
            background: var(--accent-cyan);
            color: var(--bg-deep);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover { background: #fff; transform: translateY(-2px); }

        /* Loader */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2,6,23,0.9); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 1rem;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--accent-cyan); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="spinner"></div>
        <p>Analyzing Model Integrity...</p>
    </div>

    <div class="app-container">
        <aside>
            <div class="logo">
                <div class="logo-box"></div>
                AIA DIAGNOSTIC
            </div>

            <div>
                <div class="nav-section-title">Feature Health Heatmap</div>
                <div class="feature-grid" id="heatmapGrid">
                    <!-- Heatmap cells injected here -->
                </div>
            </div>

            <div style="margin-top: auto;">
                <button class="action-btn" style="width: 100%;" onclick="location.reload()">Refresh Pipeline</button>
            </div>
        </aside>

        <main>
            <div class="exec-header">
                <div class="status-badge">
                    <div id="statusIndicator" class="status-indicator"></div>
                    <div>
                        <div id="statusText" class="status-text">Model Healthy</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary)">Last Analysis: Just Now</div>
                    </div>
                </div>
                <div class="header-stats">
                    <div class="stat-item">
                        <div class="stat-label">CONFIDENCE SCORE</div>
                        <div class="stat-value" id="confScore">98%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">ROGUE FEATURES</div>
                        <div class="stat-value" style="color: var(--accent-amber)" id="rogueCount">0</div>
                    </div>
                </div>
            </div>

            <div class="grid-layout">
                <div class="viz-card insights-card">
                    <div class="card-header">
                        <div class="card-title">Diagnostic Insights</div>
                        <div style="color: var(--accent-cyan)">AI Summary</div>
                    </div>
                    <p id="explanationText" class="insight-text">Loading insights...</p>
                </div>

                <div class="viz-card">
                    <div class="card-header">
                        <div class="card-title">Feature Importance Delta (XAI)</div>
                        <div class="stat-label">Baseline vs Drifted</div>
                    </div>
                    <div id="deltaChart" style="height: 300px;"></div>
                </div>
            </div>

            <div class="viz-card" style="margin-bottom: 1.5rem;">
                <div class="card-header">
                    <div class="card-title">The 'Mirror' Distribution (Statistical Drift)</div>
                    <select id="featureSelector" onchange="updateMirrorHistogram()" style="background: var(--bg-deep); color: white; border: 1px solid var(--border-muted); padding: 0.5rem; border-radius: 4px;">
                        <!-- Options injected -->
                    </select>
                </div>
                <div id="mirrorHistogram" style="height: 400px;"></div>
            </div>
        </main>
    </div>

    <script>
        let dashboardData = null;

        async function initDashboard() {
            try {
                const response = await fetch('/run-rca', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ drifted_features: ["Age", "Balance"] }) // Initial probe
                });
                dashboardData = await response.json();
                renderUI();
                document.getElementById('overlay').classList.add('hidden');
            } catch (err) {
                console.error(err);
                alert("Critical: Failed to fetch diagnostic data.");
            }
        }

        function renderUI() {
            // 1. Executive Status
            const rogueCount = dashboardData.rogue_features.length;
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            const confScore = document.getElementById('confScore');
            const rogueCountEl = document.getElementById('rogueCount');

            if (rogueCount > 0) {
                statusIndicator.style.background = 'var(--accent-rose)';
                statusIndicator.style.boxShadow = '0 0 15px var(--accent-rose)';
                statusText.innerText = 'Critical Drift Detected';
                confScore.innerText = (100 - (rogueCount * 15)) + '%';
            }
            rogueCountEl.innerText = rogueCount;
            document.getElementById('explanationText').innerText = dashboardData.plain_english_explanation;

            // 2. Heatmap & Selector
            const grid = document.getElementById('heatmapGrid');
            const selector = document.getElementById('featureSelector');
            grid.innerHTML = '';
            selector.innerHTML = '';

            dashboardData.feature_comparison.forEach(f => {
                const isRogue = f.is_rogue;
                const cell = document.createElement('div');
                cell.className = 'heatmap-cell';
                cell.style.background = isRogue ? 'rgba(245, 158, 11, 0.3)' : 'rgba(16, 185, 129, 0.1)';
                cell.style.color = isRogue ? 'var(--accent-amber)' : 'var(--accent-emerald)';
                cell.style.border = isRogue ? '1px solid var(--accent-amber)' : '1px solid transparent';
                cell.innerText = f.feature;
                cell.onclick = () => { selector.value = f.feature; updateMirrorHistogram(); };
                grid.appendChild(cell);

                const opt = document.createElement('option');
                opt.value = f.feature;
                opt.innerText = f.feature;
                selector.appendChild(opt);
            });

            // 3. Feature Importance Delta Chart
            renderDeltaChart();
            
            // 4. Initial Mirror Histogram
            updateMirrorHistogram();
        }

        function renderDeltaChart() {
            const features = dashboardData.feature_comparison
                .filter(f => f.baseline_mean_abs_shap > 0 || f.drifted_mean_abs_shap > 0)
                .sort((a,b) => b.drifted_mean_abs_shap - a.drifted_mean_abs_shap);

            const trace1 = {
                x: features.map(f => f.feature),
                y: features.map(f => f.baseline_mean_abs_shap),
                name: 'Training Baseline',
                type: 'bar',
                marker: { color: '#475569' }
            };

            const trace2 = {
                x: features.map(f => f.feature),
                y: features.map(f => f.drifted_mean_abs_shap),
                name: 'Production Drifted',
                type: 'bar',
                marker: { color: features.map(f => f.is_rogue ? '#f59e0b' : '#22d3ee') }
            };

            const layout = {
                barmode: 'group',
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#94a3b8', family: 'Inter' },
                margin: { t: 20, b: 40, l: 40, r: 20 },
                legend: { orientation: 'h', x: 0, y: 1.1 }
            };

            Plotly.newPlot('deltaChart', [trace1, trace2], layout, {responsive: true});
        }

        async function updateMirrorHistogram() {
            const feature = document.getElementById('featureSelector').value;
            const res = await fetch(`/get-distribution/${feature}`);
            const data = await res.json();

            const trace1 = {
                x: data.train,
                name: 'Baseline Distribution',
                type: 'histogram',
                histnorm: 'probability density',
                opacity: 0.6,
                marker: { color: '#64748b' }
            };

            const trace2 = {
                x: data.production,
                name: 'Production Distribution',
                type: 'histogram',
                histnorm: 'probability density',
                opacity: 0.6,
                marker: { color: '#22d3ee' }
            };

            const layout = {
                barmode: 'overlay',
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#94a3b8', family: 'Inter' },
                margin: { t: 20, b: 40, l: 40, r: 20 },
                xaxis: { title: feature },
                yaxis: { title: 'Density' },
                legend: { orientation: 'h', x: 0, y: 1.1 }
            };

            Plotly.newPlot('mirrorHistogram', [trace1, trace2], layout, {responsive: true});
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
