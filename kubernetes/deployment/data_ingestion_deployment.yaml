apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-ingestion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-ingestion
  template:
    metadata:
      labels:
        app: data-ingestion
    spec:
      containers:
      - name: data-ingestion
        image: kirtinigam003/data_ingestion:latest
        resources:
          requests:
            cpu: "100m"      # 0.1 CPU core
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        ports:
        - containerPort: 5000
        env:
        - name: TRAINING_URL
          value: http://model-training-service.default.svc.cluster.local:5001/train
          
        - name: SERVING_URL
          value: http://model-serving-service.default.svc.cluster.local:5002/predict

        # Drift detection microservice endpoint
        - name: DRIFT_URL
          value: http://drift-detection-service.default.svc.cluster.local:5003/drift

