apiVersion: apps/v1
kind: Deployment
metadata:
  name: drift-detection
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: drift-detection
  template:
    metadata:
      labels:
        app: drift-detection
    spec:
      containers:
      - name: drift-detection
        image: kirtinigam003/drift_detection:latest
        resources:
          requests:
            cpu: "100m"      # 0.1 CPU core
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        ports:
        - containerPort: 5003
        readinessProbe:
          httpGet:
            path: /health
            port: 5003
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 5003
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        env:
        # Training microservice endpoint (used when drift is detected)
        - name: TRAINING_URL
          value: http://model-training-service.default.svc.cluster.local:5001/train
        volumeMounts:
        - name: churn-model-storage
          mountPath: /data/churn-model
      volumes:
      - name: churn-model-storage
        persistentVolumeClaim:
          claimName: churn-model-pvc
