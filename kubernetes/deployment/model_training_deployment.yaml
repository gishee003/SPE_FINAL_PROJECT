apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-training
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-training
  template:
    metadata:
      labels:
        app: model-training
    spec:
      containers:
      - name: model-training
        image: kirtinigam003/model_training:latest
        resources:
          requests:
            cpu: "200m"      # This stays "m" for millicores
            memory: "256Mi"  # Changed from 200m to 256Mi (Megabytes)
          limits:
            cpu: "1000m"     # 1 full core
            memory: "1Gi"    # 1 Gigabyte
        ports:
        - containerPort: 5001
        volumeMounts:                
        - name: churn-model-storage
          mountPath: /data/churn-model 
      volumes:                      
      - name: churn-model-storage
        persistentVolumeClaim:
          claimName: churn-model-pvc
